<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU STORE | OFFICIAL VIP</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; padding-bottom: 80px; }

        /* 🛡️ SECURITY WALL */
        #security-wall { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #cf-box { transform: scale(0.7); height: 65px; margin-bottom: 5px; overflow: hidden; } 
        #auth-screen { display: none; width: 100%; max-width: 350px; text-align: center; }
        #main-store { display: none; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #161a26; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        /* 🛒 HEADER (ORIGINAL) */
        header { padding: 15px 20px; background: #000; border-bottom: 3px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--primary); font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .tg-link { color: #0088cc; font-size: 20px; text-decoration: none; }

        /* 📑 TABS & SECTIONS */
        .nav-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; background: #0a0c14; }
        .tab-btn { padding: 8px 18px; background: #1a1e2e; border: 1px solid #333; border-radius: 50px; color: #888; font-weight: bold; cursor: pointer; white-space: nowrap; font-family: 'Orbitron'; font-size: 10px; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        
        .section-container { display: none; padding: 15px; }
        .section-container.active { display: block; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .amt { font-family: 'Orbitron'; color: var(--accent); font-weight: bold; }

        /* 🔥 HISTORY SECTION */
        #order-history { padding: 15px; background: rgba(255,255,255,0.02); margin: 15px; border-radius: 15px; border: 1px solid #222; }
        .order-item { background: #111420; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }

        /* 📱 BOTTOM NAV */
        .b-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0b0e16; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--primary); z-index: 1000; }
        .b-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: bold; cursor: pointer; flex: 1; }
        .b-item.active { color: var(--primary); }
        .b-item i { font-size: 20px; margin-bottom: 3px; display: block; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-content { background: #0b0e16; width: 92%; max-width: 400px; padding: 20px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; max-height: 90vh; overflow-y: auto; }
        .m-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; cursor: pointer; font-size: 11px; font-weight: bold; }
        .m-btn.active { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="security-wall">
        <div class="logo" style="font-size: 28px; margin-bottom: 15px;">DAKU STORE</div>
        <div id="cf-box"><div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-callback="onCfSuccess"></div></div>
        <div id="auth-screen">
            <h3 id="auth-title" style="font-family:'Orbitron'; font-size:14px; margin-bottom:10px;">REGISTER</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()">PROCEED</button>
            <p onclick="toggleAuth()" style="margin-top:15px; color:var(--accent); cursor:pointer; font-size:11px;">Already have account? Login</p>
        </div>
    </div>

    <div id="main-store">
        <header>
            <div class="logo">DAKU STORE</div>
            <div class="header-icons">
                <a href="https://t.me/DAKU_YT_1M1" target="_blank" class="tg-link"><i class="fab fa-telegram"></i></a>
                <i class="fas fa-user-circle" onclick="openProfile()" style="color:var(--primary); font-size: 22px; cursor: pointer;"></i>
            </div>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('topup', this)">DIAMONDS 💎</button>
            <button class="tab-btn" onclick="switchTab('likes', this)">LIKES 👍</button>
            <button class="tab-btn" onclick="switchTab('war', this)">GUILD WAR ⚔️</button>
            <button class="tab-btn" onclick="switchTab('glory', this)">GLORY 🏆</button>
        </div>

        <div id="topup" class="section-container active">
            <div class="card"><div>100 Diamonds</div><div class="amt">₹80 <button onclick="openPay('100💎','80', 'player')" style="background:var(--primary); border:none; padding:5px 10px; border-radius:5px; color:white; margin-left:5px;">BUY</button></div></div>
        </div>

        <div id="war" class="section-container">
            <div class="card"><div>Guild War Starter</div><div class="amt">₹2000 <button onclick="openPay('Guild War','2000', 'guild')" style="background:var(--primary); border:none; padding:5px 10px; border-radius:5px; color:white; margin-left:5px;">BUY</button></div></div>
        </div>

        <div id="order-history">
            <h4 style="font-family:'Orbitron'; font-size:12px; color:var(--primary); margin-bottom:10px;"><i class="fas fa-history"></i> ORDER HISTORY</h4>
            <div id="live-orders-list"><p style="font-size:10px; color:#555;">No orders yet...</p></div>
        </div>

        <nav class="b-nav">
            <div class="b-item active" onclick="switchMainView('home', this)"><i class="fas fa-home"></i>HOME</div>
            <div class="b-item" onclick="switchMainView('orders', this)"><i class="fas fa-list"></i>ORDERS</div>
            <a href="https://wa.me/60126014273" class="b-item" target="_blank" style="color:#25D366;"><i class="fab fa-whatsapp"></i>HELP</a>
        </nav>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content">
            <h2 id="pName" style="color:var(--primary); font-family:'Orbitron'; font-size:18px;"></h2>
            <p id="pPrice" style="color:var(--accent); font-weight:bold;"></p>
            <input type="number" id="uid" placeholder="Player UID">
            <div id="guild-field" style="display:none;"><input type="number" id="gid" placeholder="Guild ID (GID)"></div>
            <select id="region">
                <option value="">Select Region</option>
                <option value="India">India 🇮🇳</option>
                <option value="BD">Bangladesh 🇧🇩</option>
                <option value="PK">Pakistan 🇵🇰</option>
                <option value="Nepal">Nepal 🇳🇵</option>
                <option value="Mina">Mina 🏜️</option>
                <option value="Brazil">Brazil 🇧🇷</option>
            </select>
            <div style="display:flex; gap:10px; margin:10px 0;">
                <button class="m-btn" id="upiBtn" onclick="setPay('UPI')">UPI / QR</button>
                <button class="m-btn" id="binBtn" onclick="setPay('Binance')">BINANCE</button>
            </div>
            <div id="payDetails" style="display:none; background:white; padding:10px; border-radius:10px; color:black; margin-bottom:10px;">
                <div id="upiQR" style="display:none;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=upi://pay?pa=priyanshdaku@gmail.com" width="110"><br><b style="font-size:10px;">priyanshdaku@gmail.com</b></div>
                <div id="binID" style="display:none;"><p style="font-size:12px;">Binance ID: <b style="font-size:14px;">556695942</b></p></div>
            </div>
            <input type="file" id="proof" accept="image/*" style="font-size:10px;">
            <button class="btn-main" id="subBtn" onclick="submitOrder()" style="margin-top:10px;">CONFIRM ORDER</button>
            <p onclick="closeModal('payModal')" style="cursor:pointer; color:#555; font-size:11px; margin-top:10px;">CANCEL</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", authDomain: "daku-store-f2f40.firebaseapp.com", projectId: "daku-store-f2f40", storageBucket: "daku-store-f2f40.firebasestorage.app", messagingSenderId: "556695942867", appId: "1:556695942867:web:e7ca38cd63e788cee80626" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let isLogin = false, method = "", uE = "";

        function onCfSuccess() { document.getElementById('cf-box').style.display='none'; document.getElementById('auth-screen').style.display='block'; }
        function toggleAuth() { isLogin=!isLogin; document.getElementById('auth-title').innerText=isLogin?"LOGIN":"REGISTER"; }
        function handleAuth() {
            const e=document.getElementById('email').value, p=document.getElementById('pass').value;
            if(isLogin) auth.signInWithEmailAndPassword(e,p).catch(err=>alert(err.message));
            else auth.createUserWithEmailAndPassword(e,p).catch(err=>alert(err.message));
        }
        auth.onAuthStateChanged(user => { 
            uE = user ? user.email : "";
            document.getElementById('security-wall').style.display = user ? 'none' : 'flex';
            document.getElementById('main-store').style.display = user ? 'block' : 'none';
            if(user) fetchHistory();
        });

        function fetchHistory() {
            db.collection("orders").where("email", "==", uE).orderBy("timestamp", "desc").limit(5).onSnapshot(snap => {
                const list = document.getElementById('live-orders-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<div class="order-item">
                        <div><b>${o.plan}</b><br><span style="color:#555">ID: ${o.uid} ${o.gid ? '| GID: '+o.gid : ''}</span></div>
                        <div style="color:${o.status==='Pending'?'#ffcc00':'#00ff88'}; font-weight:bold;">${o.status.toUpperCase()}</div>
                    </div>`;
                });
            });
        }

        async function submitOrder() {
            const u=document.getElementById('uid').value, g=document.getElementById('gid').value, r=document.getElementById('region').value, f=document.getElementById('proof').files[0];
            if(!u || !r || !f || !method) return alert("Bhai, Details bharo!");
            document.getElementById('subBtn').innerText = "Processing...";
            const fd=new FormData(); fd.append('image', f); fd.append('key', 'A1037b6cc94b8ad73b08a4d2e9bd529f');
            try {
                const res = await fetch('https://api.imgbb.com/1/upload', {method:'POST', body:fd});
                const d = await res.json();
                if(d.success) {
                    // 🔥 TELEGRAM ALERT 🔥
                    const msg = `🚀 *NEW ORDER*%0AUser: ${uE}%0APlan: ${document.getElementById('pName').innerText}%0AUID: ${u}%0AGID: ${g || 'N/A'}%0ARegion: ${r}%0AMethod: ${method}%0AProof: ${d.data.url}`;
                    fetch(`https://api.telegram.org/bot8677747394:AAEO10zDYYEA_jwC9HH7VoDOCOc7_4eSZDY/sendMessage?chat_id=6829395007&text=${msg}&parse_mode=Markdown`);
                    
                    await db.collection("orders").add({ email:uE, uid:u, gid:g||"", server:r, plan:document.getElementById('pName').innerText, screenshot:d.data.url, status:"Pending", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    alert("Order Placed!"); location.reload();
                }
            } catch(e) { alert("Error!"); }
        }

        function switchTab(id, b) { document.querySelectorAll('.section-container').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.getElementById(id).classList.add('active'); b.classList.add('active'); }
        function openPay(n, p, type) { document.getElementById('pName').innerText=n; document.getElementById('pPrice').innerText="₹"+p; document.getElementById('guild-field').style.display = (type === 'guild') ? 'block' : 'none'; document.getElementById('payModal').style.display='flex'; }
        function setPay(m) { method=m; document.getElementById('payDetails').style.display='block'; document.getElementById('upiQR').style.display=m=='UPI'?'block':'none'; document.getElementById('binID').style.display=m=='Binance'?'block':'none'; document.getElementById('upiBtn').classList.toggle('active', m=='UPI'); document.getElementById('binBtn').classList.toggle('active', m=='Binance'); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
    </script>
</body>
</html>
