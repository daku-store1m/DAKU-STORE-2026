<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU STORE | VIP GLOBAL STORE</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #ff4b2b; --secondary: #ff416c; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; --pink: #ff00ff; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* 🔥 LOADER FIX - 1.5s AUTO HIDE */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s ease; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 75, 43, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 🔐 VIEWS CONTROL */
        #auth-view { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1a0505 0%, #05070a 100%); }
        #main-store-view { display: none; }

        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #333; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(255, 75, 43, 0.2); }
        .auth-logo { font-family: 'Orbitron'; font-size: 24px; color: var(--primary); margin-bottom: 25px; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; background: #05070a; border: 1px solid #333; border-radius: 12px; color: white; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        /* 🛠️ MAINTENANCE */
        #maintenance-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        header { padding: 15px 20px; background: linear-gradient(to right, #000, #111); border-bottom: 3px solid var(--primary); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px; color: var(--primary); }
        .header-icons { display: flex; gap: 15px; align-items: center; }

        .nav-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: rgba(255,255,255,0.05); scrollbar-width: none; }
        .tab-btn { padding: 10px 20px; background: #1a1e2e; border: 1px solid #333; border-radius: 50px; color: #888; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 11px; font-family: 'Orbitron'; }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; margin: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .amt { font-size: 18px; font-weight: 900; font-family: 'Orbitron'; }

        #history-list { padding: 15px; }
        .history-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .status-pill { padding: 4px 10px; border-radius: 50px; font-size: 10px; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 99999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        .modal-content { background: #0b0e16; width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; border: 2px solid var(--primary); text-align: center; }
        
        .b-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0b0e16; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--primary); z-index: 10000; }
        .b-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .b-item.active { color: var(--primary); }
        .b-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .btn-buy { background: #0088cc; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body onload="startApp()">

    <div id="loader">
        <div class="spinner"></div>
        <div style="margin-top:15px; font-family:'Orbitron'; color:var(--primary);">DAKU STORE</div>
    </div>

    <div id="auth-view">
        <div class="auth-card">
            <div class="auth-logo" id="auth-title">DAKU LOGIN</div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">CONTINUE</button>
            <div style="margin-top:15px; font-size:12px; color:#888; cursor:pointer;" onclick="toggleAuth()">
                Don't have an account? <span id="toggle-span" style="color:var(--primary);">SIGNUP</span>
            </div>
        </div>
    </div>

    <div id="main-store-view">
        <div id="maintenance-screen">
            <i class="fas fa-tools" style="font-size:70px; color:var(--primary); margin-bottom:20px;"></i>
            <h1>STORE UPDATING</h1>
            <button onclick="location.reload()" class="btn-buy">REFRESH</button>
        </div>

        <header>
            <div class="logo">DAKU STORE</div>
            <div class="header-icons">
                <i class="fab fa-youtube" style="color:red;" onclick="window.open('https://www.youtube.com/@DAKU_YT_1M_YM')"></i>
                <i class="fab fa-telegram" style="color:#0088cc;" onclick="window.open('https://t.me/+NeNB5UzyGJI3OTk1')"></i>
                <i class="fas fa-user-circle" onclick="openProfile()"></i>
            </div>
        </header>

        <div id="home-view">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('topup', this)">DIAMONDS 💎</button>
                <button class="tab-btn" onclick="switchTab('likes', this)">LIKES 👍</button>
                <button class="tab-btn" onclick="switchTab('glory', this)">GLORY 🏆</button>
                <button class="tab-btn" onclick="switchTab('guild-war', this)">GUILD WAR ⚔️</button>
            </div>
            
            <div id="topup" class="section-container">
                <div class="card"><div><h3>100 Diamonds</h3><p>₹80 Pack</p></div><div style="text-align:right;"><span class="amt">₹80</span><br><button class="btn-buy" onclick="openPay('100💎','₹80')">BUY</button></div></div>
                <div class="card"><div><h3>520 Diamonds</h3><p>₹400 Pack</p></div><div style="text-align:right;"><span class="amt">₹400</span><br><button class="btn-buy" onclick="openPay('520💎','₹400')">BUY</button></div></div>
                <div class="card"><div><h3>1060 Diamonds</h3><p>₹800 Pack</p></div><div style="text-align:right;"><span class="amt">₹800</span><br><button class="btn-buy" onclick="openPay('1060💎','₹800')">BUY</button></div></div>
                <div class="card"><div><h3>4000 Diamonds</h3><p>₹2000 Pack</p></div><div style="text-align:right;"><span class="amt">₹2000</span><br><button class="btn-buy" onclick="openPay('4000💎','₹2000')">BUY</button></div></div>
            </div>
            </div>

        <div id="orders-view" style="display:none;">
            <h2 style="font-family:'Orbitron'; text-align:center; color:var(--primary);">MY ORDERS</h2>
            <div id="history-list"></div>
        </div>

        <nav class="b-nav">
            <div class="b-item active" id="home-icon" onclick="showView('home')"><i class="fas fa-home"></i>HOME</div>
            <div class="b-item" id="order-icon" onclick="showView('orders')"><i class="fas fa-shopping-bag"></i>MY ORDERS</div>
            <div class="b-item" onclick="window.open('https://t.me/+NeNB5UzyGJI3OTk1')"><i class="fab fa-telegram"></i>CHANNEL</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", projectId: "daku-store-f2f40" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let uE="", isLoginMode = true;

        // 🔥 THE KILLER LOGIC
        function startApp() {
            const ldr = document.getElementById('loader');
            
            // 1. Force hide loader after 1.5s no matter what
            setTimeout(() => {
                ldr.style.opacity = '0';
                setTimeout(() => { ldr.style.display = 'none'; }, 500);
            }, 1500);

            // 2. Check Auth
            auth.onAuthStateChanged(user => {
                if(user) {
                    uE = user.email;
                    document.getElementById('auth-view').style.display = 'none';
                    document.getElementById('main-store-view').style.display = 'block';
                    db.collection("settings").doc("maintenance").onSnapshot(doc => {
                        document.getElementById('maintenance-screen').style.display = doc.data()?.status ? 'flex' : 'none';
                    });
                } else {
                    document.getElementById('auth-view').style.display = 'flex';
                    document.getElementById('main-store-view').style.display = 'none';
                }
            });
        }

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "DAKU LOGIN" : "DAKU SIGNUP";
            document.getElementById('toggle-span').innerText = isLoginMode ? "SIGNUP" : "LOGIN";
        }

        async function handleAuth() {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return alert("Fill details!");
            try {
                if(isLoginMode) await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        function showView(v) {
            document.getElementById('home-view').style.display = v==='home' ? 'block' : 'none';
            document.getElementById('orders-view').style.display = v==='orders' ? 'block' : 'none';
        }

        function switchTab(id, b) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            b.classList.add('active');
            // Logic to switch sections...
        }
    </script>
</body>
</html>
