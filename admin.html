<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU ADMIN | VIP PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #0f121d; --accent: #00ffcc; --gold: #ffd700; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        #admin-auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #161a26; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        #admin-dashboard { display: none; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        
        /* 💰 PRICE MANAGER BOX */
        .admin-box { background: #161a26; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .admin-box h3 { color: var(--gold); font-family: 'Orbitron'; margin-top: 0; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .price-group { text-align: left; }
        .price-group label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        .update-btn { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; margin-top: 15px; width: 100%; }

        .maintenance-box { background: #161a26; padding: 15px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; margin-bottom: 20px; }
        .nav-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 20px; }
        .tab-btn { padding: 8px 15px; background: #1a1e2e; border: 1px solid #333; border-radius: 10px; color: #888; white-space: nowrap; font-size: 11px; cursor: pointer; font-family: 'Orbitron'; }
        .tab-btn.active { background: var(--primary); color: white; }

        .order-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; border-left: 5px solid var(--primary); position: relative; }
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .pending { background: #ffcc00; color: #000; }
        .success { background: #00ffcc; color: #000; }
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .act-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-done { background: #00ffcc; color: #000; }
        .btn-delete { background: #ff4b2b; color: white; }
    </style>
</head>
<body>

    <div id="admin-auth">
        <div class="auth-box">
            <h2 style="font-family:'Orbitron'; color:var(--primary);">DAKU ADMIN</h2>
            <input type="email" id="admEmail" placeholder="teamcobra665@gmail.com">
            <input type="password" id="admPass" placeholder="dakuyt1m">
            <button class="btn-login" onclick="loginAdmin()">ENTER PANEL</button>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="header">
            <h2 style="font-family:'Orbitron'; font-size: 18px; color: var(--primary);">DAKU VIP DASHBOARD</h2>
            <button onclick="logoutAdmin()" style="background:red; border: none; color:white; padding:5px 12px; border-radius:5px; font-size: 10px;">LOGOUT</button>
        </div>

        <div class="admin-box">
            <h3><i class="fas fa-tags"></i> PRICE MANAGER</h3>
            <div class="price-grid">
                <div class="price-group">
                    <label>WEEKLY STARTER (LIKES)</label>
                    <input type="number" id="rate-weekly" placeholder="Rate">
                </div>
                <div class="price-group">
                    <label>PRO BOOSTER (LIKES)</label>
                    <input type="number" id="rate-pro" placeholder="Rate">
                </div>
                <div class="price-group">
                    <label>MINI GLORY</label>
                    <input type="number" id="rate-mini" placeholder="Rate">
                </div>
                <div class="price-group">
                    <label>WAR STARTER</label>
                    <input type="number" id="rate-war" placeholder="Rate">
                </div>
            </div>
            <button class="update-btn" onclick="updateAllPrices()">UPDATE ALL RATES 🔥</button>
        </div>

        <div class="maintenance-box">
            <h3>🛠️ STORE MAINTENANCE</h3>
            <p id="m-status" style="margin: 10px 0; font-weight: bold; font-size: 12px;">Checking...</p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button onclick="setMaintenance(true)" style="background:red; color:white; border-radius:8px; border:none; padding:8px 15px; font-family:'Orbitron';">OFFLINE (BAND)</button>
                <button onclick="setMaintenance(false)" style="background:var(--accent); color:black; border-radius:8px; border:none; padding:8px 15px; font-family:'Orbitron';">ONLINE (LIVE)</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="filterOrders('all', this)">ALL ORDERS</button>
            <button class="tab-btn" onclick="filterOrders('likes', this)">LIKES</button>
            <button class="tab-btn" onclick="filterOrders('glory', this)">GLORY</button>
            <button class="tab-btn" onclick="filterOrders('war', this)">WAR</button>
            <button class="tab-btn" onclick="filterOrders('diamonds', this)">DIAMONDS</button>
        </div>

        <div id="orders-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", authDomain: "daku-store-f2f40.firebaseapp.com", projectId: "daku-store-f2f40", storageBucket: "daku-store-f2f40.firebasestorage.app", messagingSenderId: "556695942867", appId: "1:556695942867:web:e7ca38cd63e788cee80626" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_USER = "teamcobra665@gmail.com";
        const ADMIN_PASS = "dakuyt1m";

        function loginAdmin() {
            const e = document.getElementById('admEmail').value;
            const p = document.getElementById('admPass').value;
            if(e === ADMIN_USER && p === ADMIN_PASS) {
                localStorage.setItem("isDakuAdmin", "true");
                showDashboard();
            } else { alert("Galat Email ya Password!"); }
        }

        function showDashboard() {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            fetchOrders();
            listenMaintenance();
            loadCurrentPrices();
        }

        // 💰 LOAD PRICES FROM FIREBASE
        function loadCurrentPrices() {
            db.collection("products").doc("likes").get().then(doc => {
                if(doc.exists) {
                    document.getElementById('rate-weekly').value = doc.data().weekly;
                    document.getElementById('rate-pro').value = doc.data().pro;
                }
            });
            db.collection("products").doc("glory").get().then(doc => {
                if(doc.exists) document.getElementById('rate-mini').value = doc.data().mini;
            });
            db.collection("products").doc("war").get().then(doc => {
                if(doc.exists) document.getElementById('rate-war').value = doc.data().war_s;
            });
        }

        // 💰 UPDATE ALL PRICES AT ONCE
        async function updateAllPrices() {
            const w = document.getElementById('rate-weekly').value;
            const p = document.getElementById('rate-pro').value;
            const m = document.getElementById('rate-mini').value;
            const wr = document.getElementById('rate-war').value;

            try {
                await db.collection("products").doc("likes").set({ weekly: w, pro: p }, { merge: true });
                await db.collection("products").doc("glory").set({ mini: m }, { merge: true });
                await db.collection("products").doc("war").set({ war_s: wr }, { merge: true });
                alert("✅ Saare Rates Update Ho Gaye!");
            } catch(e) { alert("Error: " + e.message); }
        }

        function logoutAdmin() { localStorage.removeItem("isDakuAdmin"); location.reload(); }
        if(localStorage.getItem("isDakuAdmin") === "true") showDashboard();

        function listenMaintenance() {
            db.collection("settings").doc("config").onSnapshot((doc) => {
                const s = document.getElementById('m-status');
                if (doc.exists && doc.data().maintenance === true) { s.innerText = "🔴 STORE IS OFFLINE"; s.style.color = "red"; }
                else { s.innerText = "🟢 STORE IS ONLINE"; s.style.color = "lime"; }
            });
        }

        async function setMaintenance(val) {
            await db.collection("settings").doc("config").set({ maintenance: val }, { merge: true });
        }

        function fetchOrders() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const container = document.getElementById('orders-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    const sClass = o.status === "Pending" ? "pending" : "success";
                    container.innerHTML += `
                        <div class="order-card">
                            <span class="status-badge ${sClass}">${o.status}</span>
                            <p><b>User:</b> ${o.email}</p>
                            <p><b>Plan:</b> ${o.plan} | 🆔 ${o.uid}</p>
                            <a href="${o.screenshot}" target="_blank" style="color:cyan; font-size:12px;">VIEW PAYMENT SS</a>
                            <div class="action-btns">
                                <button class="act-btn btn-done" onclick="markDone('${doc.id}')">SUCCESS</button>
                                <button class="act-btn btn-delete" onclick="deleteOrder('${doc.id}')">DELETE</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function markDone(id) { db.collection("orders").doc(id).update({ status: "Success" }); }
        function deleteOrder(id) { if(confirm("Hamesha ke liye delete?")) db.collection("orders").doc(id).delete(); }
    </script>
</body>
</html>
