<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU ADMIN | Master Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ffcc; --bg: #05070a; --card: #11141d; }
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; color: var(--primary); font-weight: 900; letter-spacing: 5px; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        header { padding: 25px; text-align: center; border-bottom: 2px solid var(--primary); background: #000; position: sticky; top: 0; z-index: 100; }
        .order-card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #222; animation: zoomIn 0.5s; }
        .adm-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--primary); }
        .adm-item { color: #555; cursor: pointer; text-align: center; flex: 1; font-weight: bold; }
        .adm-item.active { color: var(--primary); transform: translateY(-3px); }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; width: 48%; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body onload="setTimeout(()=>document.getElementById('loader').style.display='none', 1500)">
    <div id="loader">SECURE ACCESS...</div>
    <header><h1>DAKU MASTER PANEL</h1></header>
    <div id="ordersList" style="padding:10px;"></div>
    <div class="adm-nav">
        <div class="adm-item active"><i class="fas fa-list"></i><br>Orders</div>
        <div class="adm-item" onclick="location.reload()"><i class="fas fa-sync"></i><br>Refresh</div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", authDomain: "daku-store-f2f40.firebaseapp.com", projectId: "daku-store-f2f40", storageBucket: "daku-store-f2f40.firebasestorage.app", messagingSenderId: "556695942867", appId: "1:556695942867:web:e7ca38cd63e788cee80626" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        function load() {
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('ordersList'); list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data(), id = doc.id;
                    list.innerHTML += `<div class="order-card">
                        <div style="font-size:12px; color:#00ffcc">${o.email}</div>
                        <p><b>UID:</b> ${o.uid} | <b>Server:</b> ${o.server}</p>
                        <p><b>Item:</b> ${o.plan} | <b>Status:</b> <span style="color:orange">${o.status}</span></p>
                        <a href="${o.screenshot}" target="_blank" style="color:#fff; background:#333; padding:8px; border-radius:5px; text-decoration:none; display:inline-block;">View Screenshot</a><br>
                        ${o.status==='Pending' ? `<button class="btn" style="background:#00ff88" onclick="upd('${id}','Approved')">APPROVE</button> <button class="btn" style="background:red; color:#fff" onclick="upd('${id}','Rejected')">REJECT</button>` : ''}
                    </div>`;
                });
            });
        }
        function upd(id, s) { if(confirm('Mark as '+s+'?')) db.collection("orders").doc(id).update({status:s}); }
        load();
    </script>
</body>
</html>
