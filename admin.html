<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKU ADMIN | VIP CONTROL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4b2b; --bg: #05070a; --card: #11141d; --accent: #00ffcc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); background: #000; box-shadow: 0 5px 20px rgba(255,75,43,0.3); }
        
        /* Remote/Maintenance */
        .remote-box { background: #1a1a2e; padding: 20px; margin: 20px; border-radius: 15px; border: 1px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .status-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-on { background: #2ecc71; color: white; }
        .btn-off { background: #e74c3c; color: white; }

        /* Order Cards */
        .order-card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid #222; position: relative; }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        .Pending { background: #f1c40f; color: #000; }
        .Approved { background: var(--accent); color: #000; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .info-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px solid #333; cursor: pointer; }
        .info-box small { color: var(--primary); font-size: 10px; display: block; margin-bottom: 3px; font-weight: bold; }
        .info-box span { font-size: 13px; font-weight: bold; word-break: break-all; }

        .adm-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .approve { background: var(--accent); color: #000; }
        .reject { background: #ff4d4d; color: #fff; }

        #login-box { max-width: 350px; margin: 100px auto; padding: 30px; background: var(--card); border-radius: 25px; border: 1px solid var(--primary); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body onload="checkAuth()">

    <div id="login-box" style="display:none;">
        <h2 style="color:var(--primary)">DAKU ADMIN LOGIN</h2>
        <input type="email" id="admEmail" placeholder="Enter Admin Email">
        <input type="password" id="admPass" placeholder="Enter Password">
        <button onclick="login()" class="adm-btn approve">LOGIN TO PANEL</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <header><h1>DAKU MASTER CONTROL</h1></header>

        <div class="remote-box">
            <div><b>Store Maintenance</b><br><small id="status-text">Checking...</small></div>
            <div>
                <button class="status-btn btn-on" onclick="setM(false)">OPEN</button>
                <button class="status-btn btn-off" onclick="setM(true)">CLOSE</button>
            </div>
        </div>

        <div id="ordersContainer"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAqEHz5yvkDjud1W1acYjgZ_OkuMtC8WuU", authDomain: "daku-store-f2f40.firebaseapp.com", projectId: "daku-store-f2f40", storageBucket: "daku-store-f2f40.firebasestorage.app", messagingSenderId: "556695942867", appId: "1:556695942867:web:e7ca38cd63e788cee80626" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        function checkAuth() {
            auth.onAuthStateChanged(user => {
                if(user && user.email === 'priyanshdaku@gmail.com') { // Use this for Login
                    document.getElementById('login-box').style.display='none';
                    document.getElementById('admin-panel').style.display='block';
                    loadOrders();
                } else {
                    document.getElementById('login-box').style.display='block';
                }
            });
        }

        function login() {
            const e = document.getElementById('admEmail').value;
            const p = document.getElementById('admPass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }

        function setM(v) { db.collection("settings").doc("store").set({ closed: v }, { merge: true }); }

        function loadOrders() {
            db.collection("settings").doc("store").onSnapshot(doc => {
                document.getElementById('status-text').innerText = doc.data()?.closed ? "Status: CLOSED 🔴" : "Status: OPEN 🟢";
            });

            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
                const container = document.getElementById('ordersContainer');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data(), id = doc.id;
                    container.innerHTML += `
                        <div class="order-card">
                            <span class="status-badge ${o.status}">${o.status}</span>
                            <div style="font-size:16px; font-weight:bold; color:var(--primary)">${o.plan}</div>
                            <div class="info-grid">
                                <div class="info-box" onclick="copy('${o.uid}')"><small>UID 📋</small><span>${o.uid}</span></div>
                                <div class="info-box" onclick="copy('${o.gid}')"><small>GID 📋</small><span>${o.gid || 'N/A'}</span></div>
                                <div class="info-box"><small>SERVER</small><span>${o.server}</span></div>
                                <div class="info-box"><small>METHOD</small><span>${o.method}</span></div>
                            </div>
                            <button class="adm-btn" style="background:#333; color:white;" onclick="window.open('${o.screenshot}')">VIEW SS</button>
                            ${o.status === 'Pending' ? `
                                <button class="adm-btn approve" onclick="updateStatus('${id}', 'Approved')">APPROVE</button>
                            ` : ''}
                        </div>
                    `;
                });
            });
        }

        async function updateStatus(id, s) {
            await db.collection("orders").doc(id).update({ status: s });
            if(s === 'Approved') {
                const o = (await db.collection("orders").doc(id).get()).data();
                const msg = `✅ *ORDER DONE*%0A%0A📦 Plan: ${o.plan}%0A🆔 UID: ${o.uid}%0A🌍 Srv: ${o.server}%0A%0A🔥 Done by Daku!`;
                fetch(`https://api.telegram.org/bot8677747394:AAEO10zDYYEA_jwC9HH7VoDOCOc7_4eSZDY/sendMessage?chat_id=6829395007&text=${msg}&parse_mode=Markdown`);
            }
            alert("Updated!");
        }

        function copy(t) { navigator.clipboard.writeText(t); alert("Copied!"); }
    </script>
</body>
</html>
